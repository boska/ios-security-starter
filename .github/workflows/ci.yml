name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-audit:
    name: Build, Test & Audit
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel

      - name: Install xcpretty
        run: |
          gem install xcpretty --user-install
          echo "$(ruby -e 'print Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Build XCFramework
        run: make xcframework

      - name: Security audit
        run: make audit

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileSecurityKit.xcframework
          path: build/MobileSecurityKit.xcframework
          retention-days: 7
