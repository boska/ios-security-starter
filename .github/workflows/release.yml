name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release XCFramework
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)

      - name: Install xcpretty
        run: |
          gem install xcpretty --user-install
          echo "$(ruby -e 'print Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Build XCFramework
        run: make xcframework

      - name: Security audit
        run: make audit

      - name: Zip XCFramework
        run: |
          cd build
          zip -r MobileSecurityKit-${{ github.ref_name }}.zip MobileSecurityKit.xcframework

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MobileSecurityKit ${{ github.ref_name }}
          files: build/MobileSecurityKit-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
